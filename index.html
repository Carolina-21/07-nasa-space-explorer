<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>NASA Space Explorer</title>

  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <div class="container">

    <!-- Header -->
    <header class="site-header">
      <img
        src="img/nasa-worm-logo.png"
        alt="NASA Logo"
        class="logo"
      />

      <h1>Space Explorer</h1>
    </header>


    <!-- Random Space Fact -->
    <section class="fact-section">
      <p id="space-fact"></p>
    </section>


    <!-- Date Filters -->
    <section class="filters">

      <div class="date-field">
        <label for="startDate">Start Date</label>

        <input
          type="date"
          id="startDate"
        />
      </div>


      <div class="date-field">
        <label for="endDate">End Date</label>

        <input
          type="date"
          id="endDate"
        />
      </div>


      <button id="get-images">
        Get Space Images
      </button>

    </section>


    <!-- NASA Image Gallery -->
    <main id="gallery" class="gallery">

      <div class="placeholder">

        <div class="placeholder-icon">
          🔭
        </div>

        <p>
          Select a date range and click
          "Get Space Images" to explore the cosmos!
        </p>

      </div>

    </main>

  </div>


  <!-- JavaScript -->

  <!-- Handles valid NASA APOD date ranges -->
  <script src="js/dateRange.js"></script>

  <!-- Your custom JavaScript -->
  <script src="js/script.js"></script>

</body>
</html>
