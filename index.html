<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>


<section class="fact-section">
  <p id="space-fact"></p>
</section>

<section class="date-search">
  <label for="start-date">Start Date</label>
  <input type="date" id="start-date">

  <label for="end-date">End Date</label>
  <input type="date" id="end-date">

  <button id="get-images">
    Get Space Images
  </button>
</section>

<main id="gallery" class="gallery">
  <p>Select a date range to explore the universe!</p>
</main>



</html>
